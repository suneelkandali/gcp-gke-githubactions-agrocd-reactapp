name: Build and Deploy React App to GKE

on:
  push:
    branches:
      - main  # Triggers the build whenever you push to the main branch

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Clone your repository into the GitHub runner
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Authenticate with Google Cloud using a Service Account Key
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }} # Stored safely in GitHub Secrets

      # 3. Set up the Google Cloud SDK CLI tools
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # 4. Configure Docker to securely login to your Google Artifact Registry
      - name: Configure Docker for GCP
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      # 5. Set up QEMU (Ensures cross-platform building doesn't crash on Node/Go binaries)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 6. Set up Docker Buildx (The advanced engine required for platform targeting)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 7. Build the image for Intel architecture and push it directly to GCP
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: us-central1-docker.pkg.dev/gke-hello-world-498115/react-repo/gcp-gke-githubactions-agrocd-reactapp:v4.0.0
          platforms: linux/amd64
          cache-from: type=gha # Uses GitHub Actions native cache to speed up npm install
          cache-to: type=gha,mode=max
      
      # ==========================================
      # NEW: GKE DEPLOYMENT STEPS
      # ==========================================

      # 8. Authenticate with the GKE Cluster
      - name: Get GKE Credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: gcp-gke-githubactions-agrocd-cluster
          location: us-central1
          project_id: gke-hello-world-498115

      # 9. Force GKE to pull the new image slice and restart the pods
      - name: Deploy rolling update to GKE
        run: |
          kubectl rollout restart deployment/${{ env.DEPLOYMENT_NAME }}
          
      # 10. Optional: Track deployment status until it succeeds
      - name: Verify Deployment Status
        run: |
          kubectl rollout status deployment/${{ env.DEPLOYMENT_NAME }} --timeout=2m