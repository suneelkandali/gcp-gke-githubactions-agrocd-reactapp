name: Build and Deploy React App via Argo CD

permissions:
  contents: write

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: gke-hello-world-498115
  REGISTRY_URL: us-central1-docker.pkg.dev/gke-hello-world-498115/react-repo/gcp-gke-githubactions-agrocd-reactapp
  ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
  ARGOCD_USERNAME: ${{ secrets.ARGOCD_USERNAME }}
  ARGOCD_PASSWORD: ${{ secrets.ARGOCD_PASSWORD }}
  ARGOCD_APP_NAME: reactapp-gcp-gke-githubactions-cicd
  ARGOCD_NAMESPACE: argocd

jobs:
  build-and-deploy:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCP
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY_URL }}:${{ github.sha }}
            ${{ env.REGISTRY_URL }}:latest
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update deployment manifest image tag
        run: |
          python3 <<'PY'
          from pathlib import Path, re

          path = Path('deployment.yaml')
          text = path.read_text()
          new_text = re.sub(
              r'^(\s*image:).*$',
              lambda m: f"{m.group(1)} ${{ env.REGISTRY_URL }}:${{ github.sha }}",
              text,
              flags=re.MULTILINE,
          )
          path.write_text(new_text)
          PY

      - name: Commit deployment manifest update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deployment.yaml
          if ! git diff --cached --quiet; then
            git commit -m "Update deployment image tag to ${GITHUB_SHA}"
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "No deployment manifest changes to commit."
          fi

      - name: Install Argo CD CLI
        run: |
          curl -sSL -o /usr/local/bin/argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x /usr/local/bin/argocd

      # - name: Login to Argo CD
