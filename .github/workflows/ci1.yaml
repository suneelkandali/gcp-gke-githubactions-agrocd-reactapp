name: Build and Deploy React App to GKE

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: gke-hello-world-498115
  CLUSTER_NAME: gcp-gke-githubactions-agrocd-cluster
  LOCATION: us-central1 # Changed from ZONE to LOCATION for clarity (works for regional or zonal)
  DEPLOYMENT_NAME: gcp-gke-githubactions-agrocd-reactapp-deployment
  CONTAINER_NAME: react-app # <-- Make sure this matches the 'name' field under 'containers' in your deployment.yaml
  REGISTRY_URL: us-central1-docker.pkg.dev/gke-hello-world-498115/react-repo/gcp-gke-githubactions-agrocd-reactapp

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Clone your repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Authenticate to Google Cloud
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # 3. Set up the Google Cloud SDK
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # 4. Configure Docker for Google Artifact Registry
      - name: Configure Docker for GCP
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      # 5. Set up QEMU for emulation
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 6. Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 7. Build and push Docker image using GitHub SHA as tag
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # MODIFIED: Uses the unique commit SHA as the image tag, alongside 'latest'
          tags: |
            ${{ env.REGISTRY_URL }}:${{ github.sha }}
            ${{ env.REGISTRY_URL }}:latest
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ==========================================
      # GKE DEPLOYMENT STEPS
      # ==========================================

      # 8. Authenticate with the GKE Cluster
      - name: Get GKE Credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER_NAME }}
          location: ${{ env.LOCATION }}
          project_id: ${{ env.PROJECT_ID }}

      # 9. Apply manifests and update the image dynamically
      - name: Deploy to GKE
        run: |
          # Apply your base configuration (Services, Ingress, base Deployment)
          kubectl apply -f deployment.yaml
          
          # MODIFIED: Explicitly tell Kubernetes to use the newly built image SHA. 
          # This forces a rolling update even if deployment.yaml hasn't changed.
          kubectl set image deployment/${{ env.DEPLOYMENT_NAME }} ${{ env.CONTAINER_NAME }}=\${{ env.REGISTRY_URL }}:${{ github.sha }}
          
      # 10. Track deployment status until it succeeds
      - name: Verify Deployment Status
        run: |
          kubectl rollout status deployment/${{ env.DEPLOYMENT_NAME }} --timeout=2m