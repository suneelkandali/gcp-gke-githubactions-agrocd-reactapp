apiVersion: apps/v1
kind: Deployment
metadata:
  name: reactapp-gcp-gke-githubactions-cicd-deployment
  labels:
    app: reactapp-gcp-gke-githubactions-cicd
spec:
  replicas: 2
  selector:
    matchLabels:
      app: reactapp-gcp-gke-githubactions-cicd
  template:
    metadata:
      labels:
        app: reactapp-gcp-gke-githubactions-cicd
    spec:
      containers:
      - name: react-app
        image: us-central1-docker.pkg.dev/gke-hello-world-498115/react-repo/gcp-gke-githubactions-agrocd-reactapp:1c8136b369b374823ab82993704d496795744991
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: reactapp-gcp-gke-githubactions-cicd-service
spec:
  type: LoadBalancer
  selector:
    app: reactapp-gcp-gke-githubactions-cicd
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80